<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एक साथ कई इमेज अपलोड (ImgBB)</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="file"] { margin: 15px 0; padding: 10px; border: 1px solid #ddd; width: 100%; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #45a049; }
        .result-box { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        .links-box { background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 20px; }
        .links-box h3 { margin-top: 0; color: #333; }
        textarea { width: 100%; height: 200px; font-family: monospace; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; padding: 8px; resize: vertical; }
        .error { color: red; background: #ffe6e6; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .loading { color: #666; font-style: italic; background: #f0f0f0; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .progress { background: #e0f7fa; color: #00695c; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 एक साथ कई इमेज अपलोड करें (WebP + ImgBB)</h2>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" name="image[]" multiple accept="image/*" required>
        <button type="submit">🚀 अपलोड करें</button>
    </form>

    <div id="message"></div>

    <div class="result-box" id="resultArea" style="display:none;">
        <div class="links-box">
            <h3>🔗 डायरेक्ट लिंक (Direct Links)</h3>
            <textarea id="directLinks" readonly placeholder="यहाँ लिंक दिखेंगे..."></textarea>
            <button onclick="copyToClipboard('directLinks')">📋 कॉपी करें</button>
        </div>
        <div class="links-box">
            <h3>🖼️ मीडियम लिंक (Medium Links)</h3>
            <textarea id="mediumLinks" readonly placeholder="यहाँ लिंक दिखेंगे..."></textarea>
            <button onclick="copyToClipboard('mediumLinks')">📋 कॉपी करें</button>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('uploadForm');
    const messageDiv = document.getElementById('message');
    const resultArea = document.getElementById('resultArea');
    const directTextarea = document.getElementById('directLinks');
    const mediumTextarea = document.getElementById('mediumLinks');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const files = document.querySelector('input[type="file"]').files;
        if (files.length === 0) {
            messageDiv.innerHTML = '<div class="error">❌ कृपया कम से कम एक इमेज चुनें।</div>';
            return;
        }

        // Clear previous
        messageDiv.innerHTML = '';
        resultArea.style.display = 'none';
        directTextarea.value = '';
        mediumTextarea.value = '';

        // Show progress
        const total = files.length;
        let processed = 0;
        const results = [];

        messageDiv.innerHTML = `<div class="progress">⏳ अपलोड शुरू... (0/${total})</div>`;

        const updateProgress = (count) => {
            const progDiv = messageDiv.querySelector('.progress');
            if (progDiv) progDiv.textContent = `⏳ अपलोड प्रगति: ${count}/${total} फाइलें प्रोसेस की गईं...`;
        };

        // Process files one by one
        for (let i = 0; i < total; i++) {
            const formData = new FormData();
            formData.append('image[]', files[i]);

            try {
                const response = await fetch('image_uploader.html', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success && data.results && data.results[0]) {
                    results.push(data.results[0]);
                } else {
                    results.push({ success: false, message: data.message || 'अपलोड विफल' });
                }
            } catch (err) {
                results.push({ success: false, message: err.message });
            }

            processed++;
            updateProgress(processed);
        }

        const successResults = results.filter(r => r.success);
        const failResults = results.filter(r => !r.success);

        if (successResults.length > 0) {
            // अब हर लिंक के बाद कॉमा जोड़ें (अंतिम लाइन पर भी)
            let directOutput = successResults.map(r => `'${r.url}',`).join('\n');
            let mediumOutput = successResults.map(r => `'${r.medium}',`).join('\n');

            directTextarea.value = directOutput;
            mediumTextarea.value = mediumOutput;
            resultArea.style.display = 'block';

            let msgHtml = `<div class="progress" style="background:#c8e6c9;">✅ ${successResults.length} में से ${total} फाइलें सफलतापूर्वक अपलोड हुईं।</div>`;
            if (failResults.length > 0) {
                msgHtml += `<div class="error">⚠️ ${failResults.length} फाइलें विफल रहीं। विवरण नीचे:</div>`;
                failResults.forEach((r, idx) => {
                    msgHtml += `<div class="error">❌ फाइल ${idx+1}: ${r.message}</div>`;
                });
            }
            messageDiv.innerHTML = msgHtml;
        } else {
            messageDiv.innerHTML = '<div class="error">⚠️ कोई भी इमेज अपलोड नहीं हुई। कृपया फिर से प्रयास करें।</div>';
        }
    });

    function copyToClipboard(elementId) {
        const textarea = document.getElementById(elementId);
        textarea.select();
        document.execCommand('copy');
        alert('लिंक कॉपी हो गए!');
    }
</script>
</body>
</html>
